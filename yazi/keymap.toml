[[mgr.prepend_keymap]]
on = "V"
run = 'shell "mpv --fs --keep-open=yes \"$@\""'
desc = "Open in mpv"

[[mgr.prepend_keymap]]
on = "l"
run = "plugin --sync smart-enter"
desc = "Enter directory or open file"

[[mgr.prepend_keymap]]
on = "<Right>"
run = "plugin --sync smart-enter"
desc = "Enter directory or open file"
