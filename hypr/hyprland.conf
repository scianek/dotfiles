monitor = ,preferred,auto,1.25

source = ~/.config/hypr/execs.conf
source = ~/.config/hypr/binds.conf

env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland
env = QT_AUTO_SCREEN_SCALE_FACTOR,1
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = QT_QPA_PLATFORMTHEME,qt5ct

input {
    kb_layout = pl,de
    kb_variant =
    kb_model =
    kb_options = ctrl:nocaps
    kb_rules =

    follow_mouse = 1

    touchpad {
        natural_scroll = true
		middle_button_emulation = true
    }
}

general {
    gaps_in = 8
    gaps_out = 12
    border_size = 2
	col.active_border = 0xff1C2F54
    col.inactive_border = 0x771C2F54
    layout = dwindle
}

decoration {
    rounding = 12
	blur {
		enabled = true
		size = 30
		passes = 2
		brightness = 0.65
		contrast = 1
		vibrancy = 1
		vibrancy_darkness = 1
        ignore_opacity = true
        noise = 0.05
	}
	dim_special = 0.3
}

animations {
    enabled = true

	bezier = smooth, 0.05, 0.7, 0.1, 1
	bezier = overshot, 0.05, 0.9, 0.1, 1.1

    animation = windows, 1, 5, overshot, popin 60%
    animation = windowsOut, 1, 5, default, slide
    animation = border, 1, 10, default
    animation = fade, 1, 7, default
	animation = workspaces, 1, 2.5, smooth, slidefade 15%
	animation = specialWorkspace, 1, 3, smooth, slidevert
}

dwindle {
    pseudotile = true
    preserve_split = true
	force_split = 2
}

master {
	new_on_top = true
}

misc {
	disable_hyprland_logo = true
	animate_manual_resizes = true
	animate_mouse_windowdragging = true
}

xwayland {
	force_zero_scaling = true
}

plugin {
    hyprexpo {
        columns = 3
        gap_size = 5
        workspace_method = first 1

        enable_gesture = true
        gesture_distance = 300
    }
}
